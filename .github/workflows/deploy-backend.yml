name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Bundle & Deploy → AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Bundle with esbuild
        working-directory: backend
        run: npx esbuild ./server.ts --bundle --platform=node --target=node20 --outfile=dist/index.js

      - name: Zip bundle
        working-directory: backend
        run: zip -j backend.zip dist/index.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        working-directory: backend
        run: aws lambda update-function-code --function-name velocisBackend --zip-file fileb://backend.zip
